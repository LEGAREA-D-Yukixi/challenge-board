<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChallengeBoard 管理画面</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --blue-900: #13357e;
      --blue-700: #1e40af;
      --blue-500: #2563eb;
      --blue-300: #7aa2f0;
      --orange: #f59e0b;
      --gold: #e6b53c;
      --ink: #1f2733;
      --muted: #5b6675;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", -apple-system, "Segoe UI", sans-serif;
      color: var(--ink);
      min-height: 100vh;
      position: relative;
      padding: 0 18px 60px;
    }

    /* 背景（テーマ切替） */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .bg>div {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .5s;
    }

    body[data-theme="soft"] .bg-soft {
      opacity: 1;
    }

    body[data-theme="geo"] .bg-geo {
      opacity: 1;
    }

    body[data-theme="deep"] .bg-deep {
      opacity: 1;
    }

    .bg-soft {
      background:
        radial-gradient(60% 60% at 12% 18%, #ffe6c2 0%, rgba(255, 230, 194, 0) 60%),
        radial-gradient(70% 70% at 88% 30%, #cfe0ff 0%, rgba(207, 224, 255, 0) 60%),
        linear-gradient(120deg, #fbe9cf 0%, #dfe3e8 45%, #cdddff 100%);
    }

    .bg-geo {
      background: #f4f6f8;
    }

    .bg-geo .shape {
      position: absolute;
      border-radius: 999px;
    }

    .bg-geo .bar {
      position: absolute;
      height: 30px;
      border-radius: 999px;
      transform: rotate(-38deg);
    }

    .bg-deep {
      background:
        radial-gradient(80% 90% at 18% 12%, #1b46a0 0%, rgba(27, 70, 160, 0) 55%),
        linear-gradient(160deg, #13357e 0%, #0f2c66 100%);
    }

    body[data-theme="deep"] {
      color: #f3f6fc;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 820px;
      margin: 0 auto;
      padding: 26px 4px 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .logo {
      height: 36px;
      width: 36px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 19px;
      background: linear-gradient(135deg, var(--blue-700), var(--blue-500));
      box-shadow: 0 6px 18px rgba(30, 64, 175, .35);
    }

    .brand b {
      font-size: 22px;
      letter-spacing: .01em;
      background: linear-gradient(90deg, var(--blue-700), var(--orange));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    body[data-theme="deep"] .brand b {
      background: linear-gradient(90deg, #cdd9f5, var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .themer {
      display: flex;
      gap: 7px;
    }

    .themer button {
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      padding: 8px 11px;
      border-radius: 9px;
      background: rgba(255, 255, 255, .7);
      color: #33405a;
    }

    .themer button.on {
      background: linear-gradient(135deg, var(--blue-700), var(--orange));
      color: #fff;
    }

    .card {
      max-width: 820px;
      margin: 18px auto 0;
      border-radius: 22px;
      padding: 36px 38px;
    }

    body[data-theme="soft"] .card {
      background: rgba(255, 255, 255, .78);
      backdrop-filter: blur(10px);
      box-shadow: 0 22px 54px rgba(40, 60, 110, .16);
    }

    body[data-theme="geo"] .card {
      background: #fff;
      box-shadow: 0 18px 44px rgba(30, 50, 90, .12);
    }

    body[data-theme="deep"] .card {
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .14);
      box-shadow: 0 22px 54px rgba(0, 10, 40, .4);
    }

    .card h1 {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .card .lead {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.8;
    }

    body[data-theme="deep"] .card .lead {
      color: #aebfe3;
    }

    label {
      font-size: 14px;
      font-weight: 800;
      display: block;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      font-size: 18px;
      line-height: 1.6;
      padding: 18px 20px;
      border-radius: 14px;
      border: 2px solid #d7dde6;
      outline: none;
      resize: vertical;
      font-family: inherit;
      background: #fff;
      color: var(--ink);
    }

    textarea:focus {
      border-color: var(--blue-500);
    }

    input[type="number"] {
      width: 170px;
      font-size: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 2px solid #d7dde6;
      outline: none;
      background: #fff;
      color: var(--ink);
      font-family: inherit;
    }

    input[type="number"]:focus {
      border-color: var(--blue-500);
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
    }

    body[data-theme="deep"] .hint {
      color: #9fb2da;
    }

    .count {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      text-align: right;
    }

    body[data-theme="deep"] .count {
      color: #9fb2da;
    }

    .submit {
      margin-top: 24px;
      width: 100%;
      font-size: 18px;
      font-weight: 800;
      padding: 17px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--blue-700), var(--blue-500));
      box-shadow: 0 12px 30px rgba(30, 64, 175, .35);
    }

    .submit:disabled {
      opacity: .5;
      cursor: default;
    }

    /* 確認ダイアログ */
    .ov {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      background: rgba(15, 25, 50, .55);
      backdrop-filter: blur(3px);
      padding: 18px;
    }

    .ov.show {
      display: grid;
    }

    .dialog {
      width: min(480px, 100%);
      background: #fff;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, .4);
      animation: pop .18s ease;
    }

    @keyframes pop {
      from {
        transform: scale(.96);
        opacity: 0
      }

      to {
        transform: scale(1);
        opacity: 1
      }
    }

    .dialog .ic {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 26px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--orange), #f7b733);
      color: #fff;
    }

    .dialog h2 {
      font-size: 20px;
      margin-bottom: 8px;
      color: var(--ink);
    }

    .dialog p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      font-size: 16px;
      font-weight: 800;
      padding: 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .btn-back {
      background: #eef1f5;
      color: var(--ink);
    }

    .btn-ok {
      background: linear-gradient(135deg, var(--blue-700), var(--blue-500));
      color: #fff;
    }

    .btn-ok:disabled {
      opacity: .5;
      cursor: default;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%) translateY(20px);
      background: #13357e;
      color: #fff;
      padding: 14px 26px;
      border-radius: 999px;
      font-weight: 800;
      opacity: 0;
      transition: .3s;
      z-index: 40;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body data-theme="deep">
  <div class="bg">
    <div class="bg-soft"></div>
    <div class="bg-geo">
      <span class="shape" style="width:120px;height:120px;background:#bcd2f7;left:6%;top:64%"></span>
      <span class="shape" style="width:54px;height:54px;background:#f7c873;left:3%;top:78%"></span>
      <span class="bar"
        style="width:340px;background:linear-gradient(90deg,#1e40af,#7aa2f0);right:-50px;top:10%"></span>
      <span class="bar"
        style="width:260px;background:linear-gradient(90deg,#f59e0b,#f7c873);right:-30px;top:70%"></span>
    </div>
    <div class="bg-deep">
      <svg width="100%" height="100%" viewBox="0 0 1440 900" preserveAspectRatio="none"
        style="position:absolute;inset:0">
        <path d="M0,760 C420,600 980,940 1440,640 L1440,900 L0,900 Z" fill="rgba(230,181,60,.16)" />
        <path d="M0,810 C460,690 1000,980 1440,720" fill="none" stroke="rgba(245,158,11,.5)" stroke-width="6" />
      </svg>
    </div>
  </div>

  <header>
    <div class="brand"><b>ChallengeBoard</b></div>
    <div class="themer" id="themer">
      <button data-t="soft">ソフトグラデ</button>
      <button data-t="geo">幾何学ポップ</button>
      <button data-t="deep">ディープブルー</button>
    </div>
  </header>

  <div class="card">
    <h1>ChallengeBoard 管理画面</h1>
    <p class="lead">案件概要と掲載期間を入力して登録すると、ChallengeBoard画面に表示されます。<br>掲載期間を過ぎると自動的に削除されます。</p>
    <label for="ov">案件概要</label>
    <textarea id="ov" placeholder="単価情報は削除してください。"></textarea>
    <div class="count"><span id="cnt">0</span> 文字</div>

    <label for="days" style="margin-top:24px">掲載期間（日数）</label>
    <input id="days" type="number" min="1" step="1" value="7" />
    <p class="hint">掲載期間の日数です。</p>

    <button class="submit" id="submit">登録する</button>
  </div>

  <!-- 単価情報の削除確認ダイアログ -->
  <div class="ov" id="confirm">
    <div class="dialog">
      <div class="ic">!</div>
      <h2>単価情報を削除しましたか？</h2>
      <p>従業員に表示される内容です。概要に単価・金額の記載が残っていないか、もう一度ご確認ください。</p>
      <div class="row">
        <button class="btn btn-back" id="back">戻る</button>
        <button class="btn btn-ok" id="confirmOk">削除しました</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    // ====== 設定（デプロイ前にここだけ書き換え） ======
    const SUPABASE_URL = "https://yklwkovbphqmiucnmcmu.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_V34btW_6HTEdovDYrtiDUw_FDDb93KW";
    // ===============================================

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const ovInput = document.getElementById("ov");
    const cnt = document.getElementById("cnt");
    const submit = document.getElementById("submit");
    const confirmEl = document.getElementById("confirm");

    // テーマ
    const themer = document.getElementById("themer");
    function setTheme(t) {
      document.body.dataset.theme = t;
      [...themer.children].forEach(b => b.classList.toggle("on", b.dataset.t === t));
      const u = new URL(location.href); u.searchParams.set("theme", t); history.replaceState(null, "", u);
    }
    themer.addEventListener("click", e => { if (e.target.dataset.t) setTheme(e.target.dataset.t); });
    setTheme(new URL(location.href).searchParams.get("theme") || "deep");

    ovInput.addEventListener("input", () => cnt.textContent = ovInput.value.length);

    // 登録ボタン → 確認ダイアログを開く
    submit.addEventListener("click", () => {
      if (!ovInput.value.trim()) { showToast("案件概要を入力してください"); ovInput.focus(); return; }
      confirmEl.classList.add("show");
    });
    // 戻る → 編集に戻る（何もしない）
    document.getElementById("back").onclick = () => confirmEl.classList.remove("show");
    confirmEl.addEventListener("click", e => { if (e.target === confirmEl) confirmEl.classList.remove("show"); });

    // 削除しました → 登録処理を実行
    const confirmOk = document.getElementById("confirmOk");
    confirmOk.onclick = async () => {
      confirmOk.disabled = true;
      const overview = ovInput.value.trim();
      const title = overview.split(/\r?\n/).find(l => l.trim())?.slice(0, 80) || "案件";
      const days = Math.max(1, parseInt(document.getElementById("days").value, 10) || 7);
      const { error } = await sb.from("cases").insert({ overview, title, period_days: days });
      confirmOk.disabled = false;
      if (error) { showToast("登録に失敗しました：" + error.message); return; }
      confirmEl.classList.remove("show");
      ovInput.value = ""; cnt.textContent = "0"; document.getElementById("days").value = "7";
      showToast("案件を登録しました");
    };

    function showToast(msg) {
      const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2800);
    }
  </script>
</body>

</html>
